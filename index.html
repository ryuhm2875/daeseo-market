<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Day Market Day</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#111111; --canvas:#ffffff; --cloud:#f5f5f5; --cloud2:#ebebeb;
  --mute:#707072; --faint:#a1a1a6; --hair:#d2d2d7;
  --red:#d30005; --green:#007d48; --gold:#c9a84c;
  --red-bg:#fdecec; --green-bg:#e8f5ef; --gold-bg:#faf3e2;
  --pill:9999px; --rmd:12px; --rlg:18px;
  --D:'Bebas Neue','Arial Black',sans-serif;
  --B:'Noto Sans KR',-apple-system,sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--B);
  background: var(--cloud);
  color: var(--ink);
  min-height: 100vh;
  padding: 32px 24px 80px;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 880px; margin: 0 auto; }

h1 { font-family: var(--D); font-size: 40px; letter-spacing: 1.5px; line-height: 1; margin-bottom: 8px; }
.subtitle { font-size: 15px; color: var(--mute); margin-bottom: 28px; font-weight: 500; }

.tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.tab-btn {
  border: 1.5px solid var(--hair);
  background: var(--canvas);
  color: var(--mute);
  padding: 13px 20px;
  border-radius: var(--pill);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--B);
  cursor: pointer;
}
.tab-btn.active { background: var(--ink); color: var(--canvas); border-color: var(--ink); }

.card {
  background: var(--canvas);
  border: 1px solid var(--hair);
  border-radius: var(--rlg);
  padding: 26px;
  margin-bottom: 16px;
}

input, select {
  height: 52px;
  border-radius: var(--rmd);
  border: 1.5px solid var(--hair);
  background: var(--cloud);
  padding: 0 16px;
  font-size: 16px;
  font-family: var(--B);
  font-weight: 500;
  outline: none;
  width: 100%;
  color: var(--ink);
}
input:focus, select:focus { border-color: var(--ink); background: var(--canvas); }
input::placeholder { color: var(--faint); }

button {
  border-radius: var(--rmd);
  border: none;
  padding: 15px 22px;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--B);
  cursor: pointer;
}
.btn-primary { background: var(--ink); color: var(--canvas); }
.btn-primary:active { background: #2a2a2a; }
.btn-secondary { background: var(--cloud); color: var(--ink); border: 1.5px solid var(--hair); }
.btn-secondary:active { background: var(--cloud2); }
.btn-earn { background: var(--green-bg); color: var(--green); border: 1.5px solid #d1ead9; }
.btn-earn:active { background: #ddf0e5; }
.btn-spend { background: var(--red-bg); color: var(--red); border: 1.5px solid #fde0e0; }
.btn-spend:active { background: #fadddd; }

.scan-idle { text-align: center; padding: 60px 24px; }
.scan-idle .icon-circle {
  width: 84px; height: 84px; border-radius: 50%;
  background: var(--cloud); border: 1.5px solid var(--hair);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
}
.scan-idle .icon-circle i { font-size: 36px; color: var(--mute); }
.scan-idle p { font-size: 18px; font-weight: 700; margin: 22px 0 18px; }
.scan-idle input { max-width: 260px; margin: 0 auto; text-align: center; font-size: 18px; font-weight: 700; letter-spacing: 1px; }

.result-head { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
.avatar {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--ink); color: var(--canvas);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; flex-shrink: 0;
}
.result-name { font-size: 21px; font-weight: 900; letter-spacing: -0.2px; }
.result-id { font-size: 12px; color: var(--mute); margin-top: 2px; font-weight: 700; letter-spacing: 0.4px; }
.result-balance-wrap { margin-left: auto; text-align: right; }
.result-balance-label { font-size: 11px; color: var(--mute); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
.result-balance { font-family: var(--D); font-size: 34px; letter-spacing: 0.5px; color: var(--gold); }

.row-flex { display: flex; gap: 10px; }
.row-flex > * { flex: 1; }

.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 18px 14px; border-radius: var(--rmd);
  font-weight: 700; font-size: 14px; font-family: var(--B);
}
.action-btn .ico { font-size: 22px; }
.action-btn.buy { background: var(--red-bg); color: var(--red); border: 1.5px solid #fde0e0; }
.action-btn.earn { background: var(--green-bg); color: var(--green); border: 1.5px solid #d1ead9; }
.action-btn.reset { background: var(--cloud); color: var(--mute); border: 1.5px solid var(--hair); flex: 0 0 100px; }

.item-row, .student-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 4px;
  border-bottom: 1px solid var(--hair);
}
.item-row:last-child, .student-row:last-child { border-bottom: none; }

.qty-btn {
  width: 34px; height: 34px; padding: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900;
}
.qty-minus { background: var(--cloud); color: var(--ink); border: 1.5px solid var(--hair); }
.qty-plus { background: var(--ink); color: var(--canvas); }

.empty-state { text-align: center; padding: 44px 16px; color: var(--mute); font-size: 15px; font-weight: 500; }
.empty-state i { font-size: 30px; display: block; margin-bottom: 10px; color: var(--faint); }

.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--canvas); padding: 15px 24px;
  border-radius: var(--pill); font-size: 15px; font-weight: 700; z-index: 999;
  opacity: 0; transition: opacity 0.2s;
  max-width: 90%; text-align: center;
}
.toast.show { opacity: 1; }
.toast.danger { background: var(--red); }
.toast.success { background: var(--green); }

.log-row { font-size: 14px; padding: 13px 4px; border-bottom: 1px solid var(--hair); display: flex; justify-content: space-between; gap: 12px; align-items: center; }
.log-row:last-child { border-bottom: none; }
.log-meta { color: var(--mute); font-size: 12px; white-space: nowrap; font-weight: 600; }
.log-delta-plus { color: var(--green); font-weight: 800; }
.log-delta-minus { color: var(--red); font-weight: 800; }

.lock-screen { text-align: center; padding: 100px 24px; }
.lock-screen .icon-circle {
  width: 84px; height: 84px; border-radius: 50%; background: var(--cloud); border: 1.5px solid var(--hair);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 22px;
}
.lock-screen .icon-circle i { font-size: 32px; color: var(--mute); }
.lock-screen input { max-width: 220px; margin: 18px auto 0; text-align: center; font-size: 16px; }
.lock-screen .btn-primary { margin-top: 14px; width: 220px; }

.item-name-input { border: none; background: transparent; padding: 0; font-size: 16px; font-weight: 700; color: var(--ink); }
.item-price-input { border: none; background: transparent; padding: 0; font-size: 16px; font-weight: 800; color: var(--gold); text-align: right; }

.section-label { font-size: 11px; font-weight: 700; color: var(--mute); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.4px; }
.student-row .s-name { font-size: 16px; font-weight: 800; color: var(--ink); }
.student-row .s-id { font-size: 12px; color: var(--mute); font-weight: 700; margin-top: 2px; letter-spacing: 0.3px; }
.student-row .s-balance { font-family: var(--D); font-size: 18px; letter-spacing: 0.3px; color: var(--gold); }

.item-icon-box {
  width: 42px; height: 42px; border-radius: var(--rmd); flex-shrink: 0;
  background: var(--gold-bg); border: 1.5px solid #efe0bd;
  display: flex; align-items: center; justify-content: center;
}
.item-icon-box i { font-size: 19px; color: var(--gold); }

@media (max-width: 600px) {
  h1 { font-size: 30px; }
  .result-balance { font-size: 27px; }
  .row-flex { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="wrap" id="app-root">
  <div class="lock-screen" id="lock-screen">
    <div class="icon-circle"><i class="ti ti-lock"></i></div>
    <h1>MARKET DAY</h1>
    <p class="subtitle">관리자 비밀번호를 입력하세요</p>
    <input id="admin-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')tryUnlock()">
    <div><button class="btn-primary" onclick="tryUnlock()">입장하기</button></div>
  </div>

  <div id="main-app" style="display:none;">
    <h1>ENGLISH DAY MARKET DAY</h1>
    <p class="subtitle">바코드를 스캔하고 구매와 적립을 진행하세요</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-main" onclick="switchTab('main')"><i class="ti ti-scan" style="margin-right:6px;"></i>스캔</button>
      <button class="tab-btn" id="tab-students" onclick="switchTab('students')"><i class="ti ti-users" style="margin-right:6px;"></i>학생 관리</button>
      <button class="tab-btn" id="tab-items" onclick="switchTab('items')"><i class="ti ti-shopping-bag" style="margin-right:6px;"></i>물건 관리</button>
      <button class="tab-btn" id="tab-log" onclick="switchTab('log')"><i class="ti ti-list-details" style="margin-right:6px;"></i>거래 내역</button>
    </div>

    <div id="panel-main">
      <div class="card scan-idle" id="scan-idle">
        <div class="icon-circle"><i class="ti ti-barcode"></i></div>
        <p>바코드를 스캔해 주세요</p>
        <input id="scan-input" autofocus placeholder="GH001" onkeydown="if(event.key==='Enter'){doScan(this.value); this.value='';}">
      </div>

      <div class="card" id="scan-result" style="display:none;">
        <div class="result-head">
          <div class="avatar" id="result-initials"></div>
          <div>
            <div class="result-name" id="result-name"></div>
            <div class="result-id" id="result-id"></div>
          </div>
          <div class="result-balance-wrap">
            <div class="result-balance-label">보유 달란트</div>
            <div class="result-balance" id="result-balance"></div>
          </div>
        </div>
        <div class="row-flex">
          <button class="action-btn buy" onclick="switchTab('purchase')"><span class="ico"><i class="ti ti-shopping-cart"></i></span>구매하기<br><span style="font-size:11px; opacity:0.75;">달란트 사용</span></button>
          <button class="action-btn earn" onclick="openDeposit()"><span class="ico"><i class="ti ti-coin"></i></span>적립하기<br><span style="font-size:11px; opacity:0.75;">달란트 충전</span></button>
          <button class="action-btn reset" onclick="resetScan()"><span class="ico"><i class="ti ti-refresh"></i></span>다시 스캔</button>
        </div>
      </div>

      <div class="card" id="deposit-box" style="display:none;">
        <p class="section-label">적립 · 달란트를 채워주세요</p>
        <div class="row-flex" style="margin-bottom:14px;">
          <input id="deposit-amount" type="number" placeholder="금액 (예: 50)">
          <input id="deposit-reason" type="text" placeholder="사유 (예: 퀴즈 참여)">
        </div>
        <button class="btn-earn" style="width:100%; height:52px;" onclick="doDeposit()"><i class="ti ti-circle-plus" style="margin-right:6px;"></i>적립 확정</button>
      </div>
    </div>

    <div id="panel-purchase" style="display:none;">
      <div class="card">
        <p class="section-label" id="purchase-who"></p>
        <div id="item-list"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--hair); padding-top:18px; margin-top:6px;">
          <span style="font-size:13px; color:var(--mute); font-weight:700; text-transform:uppercase; letter-spacing:0.4px;">총 결제 금액</span>
          <span style="font-family:var(--D); font-size:28px; color:var(--red);" id="cart-total">0</span>
        </div>
        <div class="row-flex" style="margin-top:16px;">
          <button class="btn-secondary" onclick="switchTab('main')">취소</button>
          <button class="btn-spend" onclick="doPurchase()"><i class="ti ti-shopping-cart" style="margin-right:6px;"></i>구매 확정</button>
        </div>
      </div>
    </div>

    <div id="panel-students" style="display:none;">
      <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:16px;">
        <div>
          <p class="section-label" style="margin-bottom:4px;">학생 명단과 바코드 관리</p>
          <p class="subtitle" style="margin-bottom:0; font-size:13px;">새 학생 추가, 이름 수정, 바코드 재발급은 레지스트리에서 할 수 있어요</p>
        </div>
        <a href="register.html" style="flex-shrink:0;"><button class="btn-primary"><i class="ti ti-id-badge-2" style="margin-right:6px;"></i>레지스트리 열기</button></a>
      </div>
      <div class="card">
        <p class="section-label">일괄 처리 · 선택한 학생에게 동시 적용</p>
        <div class="row-flex" style="margin-bottom:14px;">
          <input id="bulk-amount" type="number" placeholder="금액">
          <input id="bulk-reason" type="text" placeholder="사유 (예: 활동 참여)">
        </div>
        <div class="row-flex">
          <button class="btn-earn" onclick="bulkApply(1)"><i class="ti ti-circle-plus" style="margin-right:6px;"></i>일괄 적립</button>
          <button class="btn-spend" onclick="bulkApply(-1)"><i class="ti ti-circle-minus" style="margin-right:6px;"></i>일괄 차감</button>
        </div>
      </div>
      <div class="card">
        <div id="student-table"></div>
      </div>
    </div>

    <div id="panel-items" style="display:none;">
      <div class="card">
        <div id="item-manage-list"></div>
      </div>
      <div class="card">
        <p class="section-label">새 물건 추가</p>
        <div class="row-flex">
          <input id="new-item-name" placeholder="물건 이름 (예: 젤리)">
          <input id="new-item-price" type="number" placeholder="가격">
          <button class="btn-primary" style="flex:0 0 60px;" onclick="addItem()" aria-label="추가"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>

    <div id="panel-log" style="display:none;">
      <div class="card">
        <div id="log-list"><div class="empty-state">불러오는 중입니다</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<script src="app.js"></script>
</body>
</html>
