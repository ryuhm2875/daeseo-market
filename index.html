<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고흥대서중 영어 마켓데이</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "SF Pro Text", "Apple SD Gothic Neo", system-ui, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.28px;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #7a7a7a;
    margin-bottom: 20px;
  }

  .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    border: 1px solid rgba(0,0,0,0.08);
    background: #fafafc;
    color: #1d1d1f;
    padding: 9px 16px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
  }
  .tab-btn.active { background: #1d1d1f; color: #fff; border: none; }

  .card {
    background: #ffffff;
    border-radius: 18px;
    border: 1px solid #e0e0e0;
    padding: 20px;
    margin-bottom: 12px;
  }

  input, select {
    height: 40px;
    border-radius: 9999px;
    border: 1px solid #e0e0e0;
    padding: 0 16px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    outline: none;
  }
  input:focus, select:focus { border-color: #0066cc; }

  button {
    border-radius: 9999px;
    border: none;
    padding: 11px 18px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-primary { background: #0066cc; color: #fff; }
  .btn-primary:active { transform: scale(0.96); }
  .btn-ghost { background: transparent; color: #0066cc; border: 1px solid #0066cc; }
  .btn-neutral { background: #fafafc; color: #1d1d1f; border: 1px solid rgba(0,0,0,0.08); }
  .btn-danger { background: #fafafc; color: #a32d2d; border: 1px solid rgba(163,45,45,0.2); }

  .scan-idle { text-align: center; padding: 48px 16px; }
  .scan-idle i { font-size: 30px; color: #7a7a7a; }
  .scan-idle p { font-size: 17px; margin: 14px 0 16px; letter-spacing: -0.374px; }
  .scan-idle input { width: 180px; text-align: center; }

  .result-head { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 9999px;
    background: #e6f1fb; color: #0066cc;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; flex-shrink: 0;
  }
  .result-name { font-size: 19px; font-weight: 600; letter-spacing: -0.28px; }
  .result-id { font-size: 13px; color: #7a7a7a; margin-top: 2px; }
  .result-balance-wrap { margin-left: auto; text-align: right; }
  .result-balance-label { font-size: 12px; color: #7a7a7a; }
  .result-balance { font-size: 26px; font-weight: 600; letter-spacing: -0.374px; }

  .row-flex { display: flex; gap: 8px; }
  .row-flex > * { flex: 1; }

  .item-row, .student-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  .item-row:last-child, .student-row:last-child { border-bottom: none; }

  .qty-btn {
    width: 28px; height: 28px; padding: 0; border-radius: 9999px;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .qty-minus { background: #fff; border: 1px solid #e0e0e0; color: #1d1d1f; }
  .qty-plus { background: #0066cc; color: #fff; }

  .empty-state { text-align: center; padding: 32px 16px; color: #7a7a7a; font-size: 14px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1d1d1f; color: #fff; padding: 12px 20px;
    border-radius: 9999px; font-size: 14px; z-index: 999;
    opacity: 0; transition: opacity 0.2s;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.danger { background: #a32d2d; }

  .log-row { font-size: 13px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; gap: 8px; }
  .log-row:last-child { border-bottom: none; }
  .log-meta { color: #7a7a7a; }

  .lock-screen { text-align: center; padding: 60px 16px; }
  .lock-screen input { width: 200px; text-align: center; margin-top: 16px; }

  @media (max-width: 480px) {
    .result-balance { font-size: 22px; }
    .row-flex { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="wrap" id="app-root">
  <div class="lock-screen" id="lock-screen">
    <i class="ti ti-lock" style="font-size:32px; color:#7a7a7a;"></i>
    <h1 style="margin-top:14px;">고흥대서중 영어 마켓데이</h1>
    <p class="subtitle">관리자 비밀번호를 입력하세요</p>
    <input id="admin-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')tryUnlock()">
    <div style="margin-top:12px;"><button class="btn-primary" onclick="tryUnlock()">입장</button></div>
  </div>

  <div id="main-app" style="display:none;">
    <h1>고흥대서중 영어 마켓데이</h1>
    <p class="subtitle">바코드 스캔으로 달란트를 관리합니다</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-main" onclick="switchTab('main')">스캔</button>
      <button class="tab-btn" id="tab-students" onclick="switchTab('students')">학생 관리</button>
      <button class="tab-btn" id="tab-items" onclick="switchTab('items')">물건 관리</button>
      <button class="tab-btn" id="tab-log" onclick="switchTab('log')">거래 내역</button>
    </div>

    <div id="panel-main">
      <div class="card scan-idle" id="scan-idle">
        <i class="ti ti-barcode"></i>
        <p>바코드를 스캔하세요</p>
        <input id="scan-input" autofocus placeholder="GH001" onkeydown="if(event.key==='Enter'){doScan(this.value); this.value='';}">
      </div>

      <div class="card" id="scan-result" style="display:none;">
        <div class="result-head">
          <div class="avatar" id="result-initials"></div>
          <div>
            <div class="result-name" id="result-name"></div>
            <div class="result-id" id="result-id"></div>
          </div>
          <div class="result-balance-wrap">
            <div class="result-balance-label">잔액</div>
            <div class="result-balance" id="result-balance"></div>
          </div>
        </div>
        <div class="row-flex">
          <button class="btn-primary" onclick="switchTab('purchase')"><i class="ti ti-shopping-cart" style="margin-right:6px;"></i>구매</button>
          <button class="btn-ghost" onclick="openDeposit()"><i class="ti ti-coin" style="margin-right:6px;"></i>적립</button>
          <button class="btn-neutral" style="flex:0 0 42px;" onclick="resetScan()" aria-label="다시 스캔"><i class="ti ti-x"></i></button>
        </div>
      </div>

      <div class="card" id="deposit-box" style="display:none;">
        <p class="subtitle" style="margin-bottom:10px;">적립 금액 / 사유</p>
        <div class="row-flex" style="margin-bottom:8px;">
          <input id="deposit-amount" type="number" placeholder="금액 (예: 50)">
          <input id="deposit-reason" type="text" placeholder="사유 (예: 퀴즈 참여)">
        </div>
        <button class="btn-primary" style="width:100%;" onclick="doDeposit()">적립하기</button>
      </div>
    </div>

    <div id="panel-purchase" style="display:none;">
      <div class="card">
        <p class="subtitle" id="purchase-who" style="margin-bottom:12px;"></p>
        <div id="item-list"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f0f0f0; padding-top:14px; margin-top:8px;">
          <span class="subtitle">총액</span>
          <span style="font-size:20px; font-weight:600;" id="cart-total">0</span>
        </div>
        <div class="row-flex" style="margin-top:14px;">
          <button class="btn-neutral" onclick="switchTab('main')">취소</button>
          <button class="btn-primary" onclick="doPurchase()">구매 확정</button>
        </div>
      </div>
    </div>

    <div id="panel-students" style="display:none;">
      <div class="card">
        <p class="subtitle" style="margin-bottom:10px;">선택 학생 일괄 적립 / 차감</p>
        <div class="row-flex" style="margin-bottom:8px;">
          <input id="bulk-amount" type="number" placeholder="금액">
          <input id="bulk-reason" type="text" placeholder="사유 (예: 활동 참여)">
        </div>
        <div class="row-flex">
          <button class="btn-primary" onclick="bulkApply(1)">일괄 적립</button>
          <button class="btn-neutral" onclick="bulkApply(-1)">일괄 차감</button>
        </div>
      </div>
      <div class="card" style="padding:0;">
        <div id="student-table"></div>
      </div>
    </div>

    <div id="panel-items" style="display:none;">
      <div class="card" style="padding:0;">
        <div id="item-manage-list"></div>
      </div>
      <div class="card">
        <p class="subtitle" style="margin-bottom:10px;">새 물건 추가</p>
        <div class="row-flex">
          <input id="new-item-name" placeholder="물건 이름">
          <input id="new-item-price" type="number" placeholder="가격">
          <button class="btn-primary" style="flex:0 0 44px;" onclick="addItem()" aria-label="추가"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>

    <div id="panel-log" style="display:none;">
      <div class="card">
        <div id="log-list"><div class="empty-state">불러오는 중...</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<script src="app.js"></script>
</body>
</html>
