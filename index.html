<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고흥대서중 영어 마켓데이</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
    background: #F2F4F6;
    color: #191F28;
    min-height: 100vh;
    padding: 32px 24px 80px;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap { max-width: 880px; margin: 0 auto; }

  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
  .subtitle { font-size: 16px; color: #8B95A1; margin-bottom: 28px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab-btn {
    border: none;
    background: #ffffff;
    color: #4E5968;
    padding: 14px 22px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .tab-btn.active { background: #191F28; color: #ffffff; }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
  }

  label.field-label { display: block; font-size: 14px; font-weight: 600; color: #8B95A1; margin-bottom: 8px; }

  input, select {
    height: 56px;
    border-radius: 14px;
    border: none;
    background: #F2F4F6;
    padding: 0 18px;
    font-size: 17px;
    font-family: inherit;
    outline: none;
    width: 100%;
    color: #191F28;
  }
  input:focus, select:focus { background: #E8F3FF; box-shadow: 0 0 0 2px #3182F6 inset; }
  input::placeholder { color: #B0B8C1; }

  button {
    border-radius: 14px;
    border: none;
    padding: 16px 24px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-primary { background: #3182F6; color: #ffffff; }
  .btn-primary:active { background: #2272EB; }
  .btn-primary:disabled { background: #D1D6DB; cursor: not-allowed; }
  .btn-secondary { background: #F2F4F6; color: #191F28; }
  .btn-secondary:active { background: #E5E8EB; }
  .btn-danger-soft { background: #FFF0F0; color: #F04452; }
  .btn-danger-soft:active { background: #FFE2E2; }

  .scan-idle { text-align: center; padding: 64px 24px; }
  .scan-idle .icon-circle {
    width: 88px; height: 88px; border-radius: 50%;
    background: #E8F3FF; display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }
  .scan-idle .icon-circle i { font-size: 40px; color: #3182F6; }
  .scan-idle p { font-size: 20px; font-weight: 600; margin: 24px 0 20px; }
  .scan-idle input { max-width: 280px; margin: 0 auto; text-align: center; font-size: 20px; font-weight: 600; }

  .result-head { display: flex; align-items: center; gap: 18px; margin-bottom: 24px; }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: #E8F3FF; color: #3182F6;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; flex-shrink: 0;
  }
  .result-name { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
  .result-id { font-size: 14px; color: #8B95A1; margin-top: 3px; }
  .result-balance-wrap { margin-left: auto; text-align: right; }
  .result-balance-label { font-size: 13px; color: #8B95A1; font-weight: 600; }
  .result-balance { font-size: 32px; font-weight: 700; letter-spacing: -0.4px; color: #3182F6; }

  .row-flex { display: flex; gap: 10px; }
  .row-flex > * { flex: 1; }

  .action-btn {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 22px 16px; border-radius: 16px; background: #F2F4F6; color: #191F28;
    font-weight: 700; font-size: 16px;
  }
  .action-btn i { font-size: 26px; color: #3182F6; }
  .action-btn.danger i { color: #F04452; }

  .item-row, .student-row {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 4px;
    border-bottom: 1px solid #F2F4F6;
  }
  .item-row:last-child, .student-row:last-child { border-bottom: none; }

  .qty-btn {
    width: 36px; height: 36px; padding: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;
  }
  .qty-minus { background: #F2F4F6; color: #191F28; }
  .qty-plus { background: #3182F6; color: #fff; }

  .empty-state { text-align: center; padding: 48px 16px; color: #8B95A1; font-size: 16px; }
  .empty-state i { font-size: 32px; display: block; margin-bottom: 12px; color: #D1D6DB; }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #191F28; color: #fff; padding: 16px 26px;
    border-radius: 14px; font-size: 16px; font-weight: 600; z-index: 999;
    opacity: 0; transition: opacity 0.2s;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.danger { background: #F04452; }

  .log-row { font-size: 15px; padding: 14px 4px; border-bottom: 1px solid #F2F4F6; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
  .log-row:last-child { border-bottom: none; }
  .log-meta { color: #8B95A1; font-size: 14px; white-space: nowrap; }
  .log-delta-plus { color: #3182F6; font-weight: 700; }
  .log-delta-minus { color: #F04452; font-weight: 700; }

  .lock-screen { text-align: center; padding: 100px 24px; }
  .lock-screen .icon-circle {
    width: 88px; height: 88px; border-radius: 50%; background: #E8F3FF;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;
  }
  .lock-screen .icon-circle i { font-size: 36px; color: #3182F6; }
  .lock-screen input { max-width: 240px; margin: 20px auto 0; text-align: center; font-size: 18px; }
  .lock-screen .btn-primary { margin-top: 16px; width: 240px; }

  .item-name-input, .item-price-input {
    border: none; background: transparent; padding: 0; font-size: 17px; font-weight: 600; color: #191F28;
  }
  .item-price-input { color: #3182F6; text-align: right; }

  .section-label { font-size: 15px; font-weight: 700; color: #191F28; margin-bottom: 16px; }
  .student-row .s-name { font-size: 17px; font-weight: 700; color: #191F28; }
  .student-row .s-id { font-size: 14px; color: #4E5968; font-weight: 600; margin-top: 2px; }
  .student-row .s-balance { font-size: 18px; font-weight: 700; color: #1B64DA; }

  @media (max-width: 600px) {
    .result-balance { font-size: 26px; }
    .row-flex { flex-wrap: wrap; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="wrap" id="app-root">
  <div class="lock-screen" id="lock-screen">
    <div class="icon-circle"><i class="ti ti-lock"></i></div>
    <h1>고흥대서중 영어 마켓데이</h1>
    <p class="subtitle">관리자 비밀번호를 입력하세요</p>
    <input id="admin-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')tryUnlock()">
    <div><button class="btn-primary" onclick="tryUnlock()">입장하기</button></div>
  </div>

  <div id="main-app" style="display:none;">
    <h1>English Day Market Day</h1>
    <p class="subtitle">바코드를 스캔하고 구매와 적립을 진행하세요</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-main" onclick="switchTab('main')"><i class="ti ti-scan" style="margin-right:6px;"></i>스캔</button>
      <button class="tab-btn" id="tab-students" onclick="switchTab('students')"><i class="ti ti-users" style="margin-right:6px;"></i>학생 관리</button>
      <button class="tab-btn" id="tab-items" onclick="switchTab('items')"><i class="ti ti-shopping-bag" style="margin-right:6px;"></i>물건 관리</button>
      <button class="tab-btn" id="tab-log" onclick="switchTab('log')"><i class="ti ti-list-details" style="margin-right:6px;"></i>거래 내역</button>
    </div>

    <div id="panel-main">
      <div class="card scan-idle" id="scan-idle">
        <div class="icon-circle"><i class="ti ti-barcode"></i></div>
        <p>바코드를 스캔해 주세요</p>
        <input id="scan-input" autofocus placeholder="GH001" onkeydown="if(event.key==='Enter'){doScan(this.value); this.value='';}">
      </div>

      <div class="card" id="scan-result" style="display:none;">
        <div class="result-head">
          <div class="avatar" id="result-initials"></div>
          <div>
            <div class="result-name" id="result-name"></div>
            <div class="result-id" id="result-id"></div>
          </div>
          <div class="result-balance-wrap">
            <div class="result-balance-label">보유 달란트</div>
            <div class="result-balance" id="result-balance"></div>
          </div>
        </div>
        <div class="row-flex">
          <button class="action-btn" onclick="switchTab('purchase')"><i class="ti ti-shopping-cart"></i>구매하기</button>
          <button class="action-btn" onclick="openDeposit()"><i class="ti ti-coin"></i>적립하기</button>
          <button class="action-btn danger" onclick="resetScan()" style="flex:0 0 110px;"><i class="ti ti-refresh"></i>다시 스캔</button>
        </div>
      </div>

      <div class="card" id="deposit-box" style="display:none;">
        <p class="section-label">적립 금액과 사유를 입력하세요</p>
        <div class="row-flex" style="margin-bottom:14px;">
          <input id="deposit-amount" type="number" placeholder="금액 (예: 50)">
          <input id="deposit-reason" type="text" placeholder="사유 (예: 퀴즈 참여)">
        </div>
        <button class="btn-primary" style="width:100%; height:56px;" onclick="doDeposit()">적립하기</button>
      </div>
    </div>

    <div id="panel-purchase" style="display:none;">
      <div class="card">
        <p class="section-label" id="purchase-who"></p>
        <div id="item-list"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #F2F4F6; padding-top:20px; margin-top:8px;">
          <span style="font-size:16px; color:#8B95A1; font-weight:600;">총 결제 금액</span>
          <span style="font-size:26px; font-weight:700; color:#3182F6;" id="cart-total">0</span>
        </div>
        <div class="row-flex" style="margin-top:18px;">
          <button class="btn-secondary" onclick="switchTab('main')">취소</button>
          <button class="btn-primary" onclick="doPurchase()">구매 확정</button>
        </div>
      </div>
    </div>

    <div id="panel-students" style="display:none;">
      <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:16px;">
        <div>
          <p class="section-label" style="margin-bottom:4px;">학생 명단과 바코드 관리</p>
          <p class="subtitle" style="margin-bottom:0; font-size:14px;">새 학생 추가, 이름 수정, 바코드 재발급은 레지스트리에서 할 수 있어요</p>
        </div>
        <a href="register.html" style="flex-shrink:0;"><button class="btn-primary"><i class="ti ti-id-badge-2" style="margin-right:6px;"></i>레지스트리 열기</button></a>
      </div>
      <div class="card">
        <p class="section-label">선택한 학생에게 일괄 적립 또는 차감</p>
        <div class="row-flex" style="margin-bottom:14px;">
          <input id="bulk-amount" type="number" placeholder="금액">
          <input id="bulk-reason" type="text" placeholder="사유 (예: 활동 참여)">
        </div>
        <div class="row-flex">
          <button class="btn-primary" onclick="bulkApply(1)"><i class="ti ti-plus" style="margin-right:6px;"></i>일괄 적립</button>
          <button class="btn-danger-soft" onclick="bulkApply(-1)"><i class="ti ti-minus" style="margin-right:6px;"></i>일괄 차감</button>
        </div>
      </div>
      <div class="card">
        <div id="student-table"></div>
      </div>
    </div>

    <div id="panel-items" style="display:none;">
      <div class="card">
        <div id="item-manage-list"></div>
      </div>
      <div class="card">
        <p class="section-label">새 물건 추가</p>
        <div class="row-flex">
          <input id="new-item-name" placeholder="물건 이름 (예: 젤리)">
          <input id="new-item-price" type="number" placeholder="가격">
          <button class="btn-primary" style="flex:0 0 64px;" onclick="addItem()" aria-label="추가"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>

    <div id="panel-log" style="display:none;">
      <div class="card">
        <div id="log-list"><div class="empty-state">불러오는 중입니다</div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<script src="app.js"></script>
</body>
</html>
