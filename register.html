<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 레지스트리</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
    background: #F2F4F6; color: #191F28; padding: 32px 24px 80px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
  .subtitle { font-size: 16px; color: #4E5968; margin-bottom: 24px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #4E5968; font-weight: 600; margin-bottom: 16px; text-decoration: none; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    border: none; background: #ffffff; color: #4E5968; padding: 14px 22px;
    border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .tab-btn.active { background: #191F28; color: #ffffff; }

  .card { background: #fff; border-radius: 20px; padding: 28px; margin-bottom: 16px; }
  .section-label { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

  textarea {
    width: 100%; height: 180px; border-radius: 14px; border: none;
    background: #F2F4F6; padding: 16px 18px; font-size: 16px; font-family: inherit;
    resize: vertical; outline: none; line-height: 1.6;
  }
  textarea:focus { background: #E8F3FF; box-shadow: 0 0 0 2px #3182F6 inset; }
  input {
    height: 52px; border-radius: 12px; border: none; background: #F2F4F6;
    padding: 0 16px; font-size: 16px; font-family: inherit; outline: none; width: 100%; color: #191F28;
  }
  input:focus { background: #E8F3FF; box-shadow: 0 0 0 2px #3182F6 inset; }

  button {
    border-radius: 14px; border: none; padding: 14px 22px; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }
  .btn-primary { background: #3182F6; color: #fff; }
  .btn-primary:active { background: #2272EB; }
  .btn-secondary { background: #F2F4F6; color: #191F28; }
  .btn-danger-soft { background: #FFF0F0; color: #F04452; }
  .help { font-size: 14px; color: #4E5968; line-height: 1.7; margin-bottom: 14px; }
  .help b { color: #191F28; font-weight: 700; }
  .status { font-size: 15px; font-weight: 600; margin-top: 14px; }
  .status.ok { color: #1B64DA; }
  .status.error { color: #F04452; }

  .search-bar { margin-bottom: 16px; }
  .search-bar input { max-width: 320px; }

  .roster-row {
    display: grid; grid-template-columns: 36px 1fr 140px 110px 80px; align-items: center; gap: 14px;
    padding: 14px 8px; border-bottom: 1px solid #F2F4F6;
  }
  .roster-row.header { color: #4E5968; font-size: 13px; font-weight: 700; padding-bottom: 12px; }
  .roster-row:last-child { border-bottom: none; }
  .roster-name-input { font-size: 16px; font-weight: 600; height: 44px; }
  .roster-id { font-size: 14px; color: #4E5968; font-weight: 700; }
  .roster-balance { font-size: 16px; font-weight: 700; color: #1B64DA; text-align: right; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    border: none; padding: 0;
  }
  .icon-btn.save { background: #E8F3FF; color: #3182F6; }
  .icon-btn.delete { background: #FFF0F0; color: #F04452; }

  .empty-state { text-align: center; padding: 48px 16px; color: #4E5968; font-size: 16px; }
  .empty-state i { font-size: 32px; display: block; margin-bottom: 12px; color: #B0B8C1; }

  .barcode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 8px; }
  .barcode-card { border-radius: 14px; padding: 18px 14px; text-align: center; background: #F2F4F6; }
  .barcode-card .name { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .barcode-card svg { width: 100%; height: 50px; }
  .barcode-card .code { font-size: 13px; color: #4E5968; margin-top: 6px; letter-spacing: 1px; font-weight: 700; }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #191F28; color: #fff; padding: 16px 26px; border-radius: 14px;
    font-size: 16px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.2s;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.danger { background: #F04452; }

  @media print {
    body { background: #fff; padding: 0; }
    .no-print { display: none; }
    .card { box-shadow: none; padding: 0; }
    .barcode-card { background: #fff; border: 1px solid #E5E8EB; break-inside: avoid; }
  }
  @media (max-width: 700px) {
    .roster-row { grid-template-columns: 28px 1fr 90px; }
    .roster-balance, .roster-row.header span:nth-child(4) { display: none; }
    .barcode-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back-link no-print"><i class="ti ti-arrow-left"></i>메인 앱으로 돌아가기</a>
  <h1>학생 레지스트리</h1>
  <p class="subtitle">전체 명단을 확인하고, 추가, 수정, 삭제, 바코드 재발급까지 할 수 있어요</p>

  <div class="tabs no-print">
    <button class="tab-btn active" id="tab-roster" onclick="switchTab('roster')"><i class="ti ti-list" style="margin-right:6px;"></i>전체 명단</button>
    <button class="tab-btn" id="tab-add" onclick="switchTab('add')"><i class="ti ti-user-plus" style="margin-right:6px;"></i>새 학생 추가</button>
  </div>

  <div id="panel-roster">
    <div class="card no-print search-bar">
      <input id="search-input" placeholder="이름 또는 학번으로 검색" oninput="renderRoster()">
    </div>
    <div class="card">
      <div class="roster-row header">
        <span></span><span>이름</span><span>학번</span><span>잔액</span><span></span>
      </div>
      <div id="roster-list"><div class="empty-state">불러오는 중입니다</div></div>
    </div>
    <div class="card" id="selected-barcode-section" style="display:none;">
      <p class="section-label">선택한 학생 바코드</p>
      <div class="barcode-grid" id="selected-barcode-grid"></div>
      <button class="btn-secondary no-print" style="margin-top:14px;" onclick="window.print()"><i class="ti ti-printer" style="margin-right:6px;"></i>인쇄하기</button>
    </div>
  </div>

  <div id="panel-add" style="display:none;">
    <div class="card">
      <p class="section-label">새 학생 명단 입력</p>
      <p class="help">
        한 줄에 한 명씩 이름만 입력하면 기존 마지막 학번 다음 번호부터 자동으로 매겨져요.<br>
        학번을 직접 지정하려면 <b>학번,이름</b> 형식으로 입력하세요. (예: GH010,박지호)
      </p>
      <textarea id="student-input" placeholder="박지호&#10;이서연&#10;김민준&#10;..."></textarea>
      <div style="margin-top:14px;">
        <button class="btn-primary" onclick="registerStudents()"><i class="ti ti-cloud-upload" style="margin-right:6px;"></i>등록하고 바코드 생성</button>
      </div>
      <div class="status" id="status"></div>
    </div>
    <div class="card" id="new-barcode-section" style="display:none;">
      <p class="section-label">새로 등록된 바코드</p>
      <div class="barcode-grid" id="new-barcode-grid"></div>
      <button class="btn-secondary no-print" style="margin-top:14px;" onclick="window.print()"><i class="ti ti-printer" style="margin-right:6px;"></i>인쇄하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBsm8OMI_Do2T1d1tUZqjBavwp8bc4IKGg",
  authDomain: "market-399ce.firebaseapp.com",
  projectId: "market-399ce",
  storageBucket: "market-399ce.firebasestorage.app",
  messagingSenderId: "255179750883",
  appId: "1:255179750883:web:a7c74cbef815821e9834d6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allStudents = [];
const selectedForBarcode = new Set();

function switchTab(name) {
  document.getElementById('panel-roster').style.display = (name === 'roster') ? 'block' : 'none';
  document.getElementById('panel-add').style.display = (name === 'add') ? 'block' : 'none';
  document.getElementById('tab-roster').classList.toggle('active', name === 'roster');
  document.getElementById('tab-add').classList.toggle('active', name === 'add');
}

function loadRoster() {
  db.collection('students').orderBy('id').onSnapshot(snap => {
    allStudents = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
    renderRoster();
  }, () => {
    document.getElementById('roster-list').innerHTML = '<div class="empty-state">명단을 불러오지 못했습니다</div>';
  });
}

function renderRoster() {
  const wrap = document.getElementById('roster-list');
  const keyword = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const filtered = allStudents.filter(s =>
    !keyword || s.name.toLowerCase().includes(keyword) || s.id.toLowerCase().includes(keyword)
  );
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><i class="ti ti-users"></i>' +
      (allStudents.length === 0 ? '등록된 학생이 없습니다' : '검색 결과가 없습니다') + '</div>';
    return;
  }
  wrap.innerHTML = '';
  filtered.forEach(s => {
    const row = document.createElement('div');
    row.className = 'roster-row';
    row.innerHTML =
      '<input type="checkbox" data-docid="' + s.docId + '" class="barcode-check" style="width:22px;height:22px;accent-color:#3182F6;" ' + (selectedForBarcode.has(s.docId) ? 'checked' : '') + '>' +
      '<input class="roster-name-input" value="' + escapeHtml(s.name) + '" data-docid="' + s.docId + '">' +
      '<span class="roster-id">' + escapeHtml(s.id) + '</span>' +
      '<span class="roster-balance">' + s.balance.toLocaleString() + '</span>' +
      '<div style="display:flex; gap:6px;">' +
        '<button class="icon-btn save" onclick="saveName(\'' + s.docId + '\')" aria-label="이름 저장"><i class="ti ti-check"></i></button>' +
        '<button class="icon-btn delete" onclick="deleteStudent(\'' + s.docId + '\', \'' + escapeHtml(s.name) + '\')" aria-label="삭제"><i class="ti ti-trash"></i></button>' +
      '</div>';
    wrap.appendChild(row);
  });
  wrap.querySelectorAll('.barcode-check').forEach(cb => {
    cb.addEventListener('change', e => {
      const id = e.target.dataset.docid;
      if (e.target.checked) selectedForBarcode.add(id); else selectedForBarcode.delete(id);
      renderSelectedBarcodes();
    });
  });
  renderSelectedBarcodes();
}

async function saveName(docId) {
  const input = document.querySelector('.roster-name-input[data-docid="' + docId + '"]');
  const newName = input.value.trim();
  if (!newName) { showToast('이름을 입력해 주세요', true); return; }
  try {
    await db.collection('students').doc(docId).update({ name: newName });
    showToast('이름을 수정했어요');
  } catch (e) {
    showToast('수정 중 문제가 생겼어요', true);
  }
}

async function deleteStudent(docId, name) {
  if (!confirm(name + ' 학생을 명단에서 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  try {
    await db.collection('students').doc(docId).delete();
    selectedForBarcode.delete(docId);
    showToast(name + ' 학생을 삭제했어요');
  } catch (e) {
    showToast('삭제 중 문제가 생겼어요', true);
  }
}

function renderSelectedBarcodes() {
  const section = document.getElementById('selected-barcode-section');
  const grid = document.getElementById('selected-barcode-grid');
  const targets = allStudents.filter(s => selectedForBarcode.has(s.docId));
  if (targets.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = '';
  targets.forEach(s => {
    const card = document.createElement('div');
    card.className = 'barcode-card';
    card.innerHTML =
      '<div class="name">' + escapeHtml(s.name) + '</div>' +
      '<svg class="bc"></svg>' +
      '<div class="code">' + escapeHtml(s.id) + '</div>';
    grid.appendChild(card);
    JsBarcode(card.querySelector('.bc'), s.id, { format: "CODE128", displayValue: false, height: 40, margin: 0 });
  });
}

async function registerStudents() {
  const raw = document.getElementById('student-input').value.trim();
  if (!raw) { setStatus('명단을 입력해 주세요', true); return; }
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  setStatus(lines.length + '명을 등록하고 있어요', false);

  let maxNum = 0;
  allStudents.forEach(s => {
    const m = (s.id || '').match(/GH(\d+)/);
    if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
  });

  const batch = db.batch();
  const newStudents = [];
  lines.forEach(line => {
    let id, name;
    if (line.includes(',')) {
      const parts = line.split(',');
      id = parts[0].trim();
      name = parts[1].trim();
      if (!id) { maxNum++; id = 'GH' + String(maxNum).padStart(3, '0'); }
    } else {
      maxNum++;
      id = 'GH' + String(maxNum).padStart(3, '0');
      name = line;
    }
    const ref = db.collection('students').doc();
    batch.set(ref, { id, name, balance: 0 });
    newStudents.push({ id, name });
  });

  try {
    await batch.commit();
    setStatus(newStudents.length + '명 등록을 완료했어요', false);
    document.getElementById('student-input').value = '';
    renderNewBarcodes(newStudents);
  } catch (e) {
    setStatus('등록 중 문제가 생겼어요: ' + e.message, true);
  }
}

function renderNewBarcodes(list) {
  const section = document.getElementById('new-barcode-section');
  const grid = document.getElementById('new-barcode-grid');
  grid.innerHTML = '';
  section.style.display = 'block';
  list.forEach(s => {
    const card = document.createElement('div');
    card.className = 'barcode-card';
    card.innerHTML =
      '<div class="name">' + escapeHtml(s.name) + '</div>' +
      '<svg class="bc"></svg>' +
      '<div class="code">' + escapeHtml(s.id) + '</div>';
    grid.appendChild(card);
    JsBarcode(card.querySelector('.bc'), s.id, { format: "CODE128", displayValue: false, height: 40, margin: 0 });
  });
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (isError ? 'error' : 'ok');
}
function showToast(msg, danger) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('danger', !!danger);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2400);
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

loadRoster();
</script>
</body>
</html>
